<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AJAYVPS — Sign in</title>
<link rel="stylesheet" href="data:text/css;base64," />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0d18;--card:#111524;--card2:#0d1120;--border:#1e2438;
    --text:#e6ebf5;--muted:#7a85a0;--primary:#22e39a;--accent:#3ec5ff;
    --danger:#ff4d6d;--warn:#ffb648;
  }
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:
      radial-gradient(ellipse at top,rgba(34,227,154,.18),transparent 60%),
      radial-gradient(ellipse at bottom right,rgba(62,197,255,.15),transparent 60%),
      var(--bg);
    color:var(--text);min-height:100%;display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .wrap{width:100%;max-width:420px;animation:fade .5s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .brand{display:flex;flex-direction:column;align-items:center;margin-bottom:24px;text-align:center}
  .logo{
    width:56px;height:56px;border-radius:16px;
    background:linear-gradient(135deg,var(--primary),var(--accent));
    display:flex;align-items:center;justify-content:center;font-size:28px;
    box-shadow:0 20px 50px -20px rgba(34,227,154,.5);margin-bottom:14px;
  }
  h1{font-size:28px;font-weight:800;letter-spacing:-.02em}
  h1 span{background:linear-gradient(135deg,var(--primary),var(--accent));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sub{color:var(--muted);font-size:13px;margin-top:6px}
  .card{
    background:linear-gradient(160deg,#13182a,#0c1020);
    border:1px solid var(--border);border-radius:18px;padding:24px;
    box-shadow:0 10px 30px -12px rgba(0,0,0,.6);
  }
  label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--text)}
  input{
    width:100%;background:#0d1120;border:1px solid var(--border);color:var(--text);
    padding:11px 13px;border-radius:10px;font-size:14px;outline:none;transition:.2s;
  }
  input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(34,227,154,.15)}
  .field{margin-bottom:14px}
  .btn{
    width:100%;background:linear-gradient(135deg,var(--primary),var(--accent));
    color:#0a0d18;border:0;padding:12px;border-radius:10px;font-weight:700;
    font-size:14px;cursor:pointer;transition:.2s;
    box-shadow:0 0 30px rgba(34,227,154,.35);
  }
  .btn:hover{opacity:.9;transform:translateY(-1px)}
  .btn:disabled{opacity:.6;cursor:not-allowed}
  .toast{
    position:fixed;top:20px;right:20px;background:#13182a;border:1px solid var(--border);
    padding:12px 16px;border-radius:10px;font-size:13px;display:none;animation:fade .3s;z-index:99;
  }
  .toast.err{border-color:var(--danger);color:var(--danger)}
  .toast.ok{border-color:var(--primary);color:var(--primary)}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div class="wrap">
  <div class="brand">
    <div class="logo">⚡</div>
    <h1>Sign in to <span>AJAYVPS</span></h1>
    <div class="sub">Any username & password works — account auto-created on first login.</div>
  </div>
  <form id="f" class="card">
    <div class="field">
      <label>Username</label>
      <input id="u" autocomplete="username" placeholder="ajay" required>
    </div>
    <div class="field">
      <label>Password</label>
      <input id="p" type="password" autocomplete="current-password" placeholder="••••••••" required>
    </div>
    <button id="btn" class="btn" type="submit">Sign in / Create</button>
  </form>
</div>
<script>
  const toast=(m,k='err')=>{const t=document.getElementById('toast');t.textContent=m;t.className='toast '+k;t.style.display='block';setTimeout(()=>t.style.display='none',2500)};
  document.getElementById('f').addEventListener('submit',async e=>{
    e.preventDefault();
    const btn=document.getElementById('btn');btn.disabled=true;btn.textContent='Signing in...';
    try{
      const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({username:document.getElementById('u').value.trim(),password:document.getElementById('p').value})});
      const d=await r.json();
      if(!r.ok)throw new Error(d.detail||'Login failed');
      localStorage.setItem('ajayvps_token',d.token);
      localStorage.setItem('ajayvps_user',d.username);
      toast('Welcome '+d.username,'ok');
      setTimeout(()=>location.href='/dashboard',400);
    }catch(err){toast(err.message);btn.disabled=false;btn.textContent='Sign in / Create';}
  });
  if(localStorage.getItem('ajayvps_token'))location.href='/dashboard';
</script>
</body>
</html>
