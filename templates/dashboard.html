<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AJAYVPS — Dashboard</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0a0d18;--card:#111524;--border:#1e2438;--text:#e6ebf5;--muted:#7a85a0;
    --primary:#22e39a;--accent:#3ec5ff;--danger:#ff4d6d;--warn:#ffb648}
  body{font-family:'Inter',system-ui,sans-serif;background:
    radial-gradient(ellipse at top,rgba(34,227,154,.12),transparent 60%),
    radial-gradient(ellipse at bottom right,rgba(62,197,255,.1),transparent 60%),var(--bg);
    color:var(--text);min-height:100vh}
  header{position:sticky;top:0;z-index:30;background:rgba(10,13,24,.85);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border)}
  .nav{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;
    padding:12px 20px;height:56px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800}
  .brand .logo{width:32px;height:32px;border-radius:9px;
    background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center}
  .brand .name{background:linear-gradient(135deg,var(--primary),var(--accent));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .nav-r{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted)}
  .icon-btn{background:transparent;border:1px solid var(--border);color:var(--text);
    padding:7px 10px;border-radius:8px;cursor:pointer;font-size:13px}
  .icon-btn:hover{background:#171c30}
  main{max-width:1200px;margin:0 auto;padding:32px 20px}
  .head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;margin-bottom:24px}
  h1{font-size:28px;font-weight:800;letter-spacing:-.02em}
  .head p{color:var(--muted);font-size:13px;margin-top:4px}
  .btn{background:linear-gradient(135deg,var(--primary),var(--accent));color:#0a0d18;
    border:0;padding:10px 16px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;
    box-shadow:0 0 25px rgba(34,227,154,.3)}
  .btn:hover{opacity:.9}
  .grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
  .scard{background:linear-gradient(160deg,#13182a,#0c1020);border:1px solid var(--border);
    border-radius:16px;padding:18px;cursor:pointer;transition:.2s;position:relative;animation:fade .4s}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .scard:hover{transform:translateY(-2px);border-color:#2a3354;box-shadow:0 20px 50px -25px rgba(34,227,154,.4)}
  .srow{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .siconw{width:42px;height:42px;border-radius:11px;background:#171c30;display:flex;align-items:center;justify-content:center;font-size:18px}
  .sname{font-weight:700}
  .sruntime{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .sstat{display:flex;align-items:center;gap:6px;font-size:11px;font-family:'JetBrains Mono',monospace;
    text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
  .dot{width:8px;height:8px;border-radius:50%;background:#555}
  .dot.run{background:var(--primary);box-shadow:0 0 10px var(--primary);animation:pulse 2s infinite}
  @keyframes pulse{50%{opacity:.5;transform:scale(1.2)}}
  .smain{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .del{position:absolute;top:12px;right:12px;background:transparent;border:0;color:var(--muted);cursor:pointer;
    padding:6px;border-radius:6px;opacity:0;transition:.2s;font-size:14px}
  .scard:hover .del{opacity:1}
  .del:hover{color:var(--danger);background:rgba(255,77,109,.1)}
  .empty{text-align:center;padding:60px 20px;background:linear-gradient(160deg,#13182a,#0c1020);
    border:1px solid var(--border);border-radius:18px;color:var(--muted)}
  .empty .ic{font-size:44px;margin-bottom:14px;opacity:.5}
  /* modal */
  .ovl{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);display:none;
    align-items:center;justify-content:center;z-index:50;padding:20px}
  .ovl.open{display:flex}
  .modal{background:linear-gradient(160deg,#13182a,#0c1020);border:1px solid var(--border);
    border-radius:16px;padding:24px;width:100%;max-width:420px}
  .modal h2{font-size:18px;font-weight:700;margin-bottom:18px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;margin-bottom:6px}
  .field input,.field select{width:100%;background:#0d1120;border:1px solid var(--border);
    color:var(--text);padding:10px 12px;border-radius:9px;font-size:14px;outline:none}
  .field input:focus,.field select:focus{border-color:var(--primary)}
  .mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);
    padding:9px 14px;border-radius:9px;cursor:pointer;font-size:13px}
  .toast{position:fixed;top:20px;right:20px;background:#13182a;border:1px solid var(--border);
    padding:12px 16px;border-radius:10px;font-size:13px;display:none;z-index:99}
  .toast.err{border-color:var(--danger);color:var(--danger)}
  .toast.ok{border-color:var(--primary);color:var(--primary)}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<header><div class="nav">
  <div class="brand"><div class="logo">⚡</div><span>AJAY<span class="name">VPS</span></span></div>
  <div class="nav-r"><span id="userlbl"></span><button class="icon-btn" onclick="logout()">Logout</button></div>
</div></header>
<main>
  <div class="head">
    <div><h1>Your servers</h1><p>Unlimited hosting · Python, Node & Static · Real logs</p></div>
    <button class="btn" onclick="openModal()">+ New server</button>
  </div>
  <div id="grid" class="grid"></div>
  <div id="empty" class="empty" style="display:none">
    <div class="ic">🖥️</div><div style="font-size:18px;font-weight:700;color:var(--text)">No servers yet</div>
    <div style="margin-top:6px">Create your first AJAYVPS server above.</div>
  </div>
</main>
<div id="ovl" class="ovl"><div class="modal">
  <h2>Create new server</h2>
  <div class="field"><label>Name</label><input id="mname" placeholder="my-bot"></div>
  <div class="field"><label>Runtime</label>
    <select id="mrt"><option value="python">Python 3</option><option value="node">Node.js</option><option value="static">Static HTML</option></select>
  </div>
  <div class="mfoot"><button class="btn-ghost" onclick="closeModal()">Cancel</button>
    <button class="btn" onclick="create()">Create</button></div>
</div></div>
<script>
const T=()=>localStorage.getItem('ajayvps_token');
const RT={python:'🐍',node:'🟢',static:'🌐'};
const RTL={python:'Python',node:'Node.js',static:'Static'};
if(!T())location.href='/';
document.getElementById('userlbl').textContent='@'+(localStorage.getItem('ajayvps_user')||'');
const toast=(m,k='err')=>{const t=document.getElementById('toast');t.textContent=m;t.className='toast '+k;t.style.display='block';setTimeout(()=>t.style.display='none',2500)};
async function api(p,o={}){o.headers={...(o.headers||{}),'Authorization':'Bearer '+T()};
  if(o.body&&!(o.body instanceof FormData))o.headers['Content-Type']='application/json';
  const r=await fetch(p,o);if(r.status===401){logout();return}
  const d=r.status===204?{}:await r.json();if(!r.ok)throw new Error(d.detail||'Failed');return d}
function logout(){localStorage.clear();location.href='/'}
function openModal(){document.getElementById('ovl').classList.add('open')}
function closeModal(){document.getElementById('ovl').classList.remove('open')}
async function create(){
  const name=document.getElementById('mname').value.trim();
  const runtime=document.getElementById('mrt').value;
  if(!name)return toast('Name required');
  try{const s=await api('/api/servers',{method:'POST',body:JSON.stringify({name,runtime})});
    location.href='/server/'+s.id}catch(e){toast(e.message)}
}
async function del(id,e){e.stopPropagation();if(!confirm('Delete this server?'))return;
  try{await api('/api/servers/'+id,{method:'DELETE'});toast('Deleted','ok');load()}catch(e){toast(e.message)}}
async function load(){
  try{const items=await api('/api/servers');const g=document.getElementById('grid');
    document.getElementById('empty').style.display=items.length?'none':'block';
    g.innerHTML=items.map(s=>`
      <div class="scard" onclick="location.href='/server/${s.id}'">
        <button class="del" onclick="del('${s.id}',event)">🗑</button>
        <div class="srow"><div class="siconw">${RT[s.runtime]||'📦'}</div>
          <div><div class="sname">${s.name}</div><div class="sruntime">${RTL[s.runtime]||s.runtime}</div></div></div>
        <div class="sstat"><span class="dot ${s.status==='running'?'run':''}"></span>${s.status}
          ${s.main_file?`<span class="smain">${s.main_file}</span>`:''}</div>
      </div>`).join('');
  }catch(e){toast(e.message)}
}
load();setInterval(load,5000);
</script>
</body>
</html>
